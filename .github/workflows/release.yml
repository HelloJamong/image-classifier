name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest tests/ -v

      - name: Verify icon asset
        shell: pwsh
        run: |
          if (-not (Test-Path "logo.ico")) {
            throw "logo.ico not found. The release exe icon requires logo.ico at the repository root."
          }

      - name: Build exe
        run: python -m PyInstaller --onefile --console --name classify_images --icon logo.ico classify.py

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract changelog section
        shell: python
        run: |
          import re, os, sys
          version = os.environ["VERSION"]
          with open("CHANGELOG.md", encoding="utf-8") as f:
              content = f.read()
          pattern = rf"(?m)^## \[{re.escape(version)}\].*?(?=^## \[|\Z)"
          match = re.search(pattern, content, re.DOTALL)
          if not match:
              print(f"[ERROR] CHANGELOG.md에 버전 {version} 섹션이 없습니다.", file=sys.stderr)
              sys.exit(1)
          with open("release_notes.md", "w", encoding="utf-8") as f:
              f.write(match.group().strip())
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: dist/classify_images.exe
